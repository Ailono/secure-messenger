<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Messenger</title>
<link rel="manifest" href="/web/manifest.json">
<meta name="theme-color" content="#16212e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Messenger">
<script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #16212e; color: #e0e0e0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Login ── */
#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; padding: 24px; }
#login-screen h1 { color: #5b9bd5; font-size: 24px; margin-bottom: 8px; }
#login-screen input { width: 100%; max-width: 320px; padding: 13px 16px; background: #1e2d3d; border: 1px solid #2a3a50; border-radius: 10px; color: #e0e0e0; font-size: 15px; outline: none; }
#login-screen input:focus { border-color: #5b9bd5; }
#login-screen button { width: 100%; max-width: 320px; padding: 13px; background: #2b5278; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
#login-screen button:active { background: #1e3d5c; }
#login-error { color: #f44336; font-size: 13px; min-height: 18px; }

/* ── App layout ── */
#app { display: none; flex: 1; overflow: hidden; }
#app.show { display: flex; }

/* ── Sidebar ── */
#sidebar { width: 280px; background: #1a2535; border-right: 1px solid #2a3a50; display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar-header { padding: 16px; border-bottom: 1px solid #2a3a50; }
#sidebar-header .app-title { color: #5b9bd5; font-size: 16px; font-weight: bold; margin-bottom: 4px; }
#sidebar-header .my-name { color: #888; font-size: 12px; }
#users-list { flex: 1; overflow-y: auto; }
#users-list::-webkit-scrollbar { width: 4px; }
#users-list::-webkit-scrollbar-thumb { background: #2a3a50; border-radius: 2px; }
.user-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #1e2d3d; transition: background 0.15s; }
.user-item:hover { background: #1e2d3d; }
.user-item.active { background: #2b5278; }
.user-avatar { width: 42px; height: 42px; background: #2b5278; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.user-item.active .user-avatar { background: #3a6a9a; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-last { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.user-badge { background: #5b9bd5; color: white; border-radius: 10px; font-size: 11px; padding: 2px 6px; flex-shrink: 0; }
#no-users { padding: 24px 16px; text-align: center; color: #555; font-size: 13px; }

/* ── Chat area ── */
#chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; gap: 12px; }
#empty-state .icon { font-size: 64px; }
#chat-view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#chat-view.show { display: flex; }

#chat-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #1e2d3d; border-bottom: 1px solid #2a3a50; flex-shrink: 0; }
#chat-header .avatar { width: 38px; height: 38px; background: #2b5278; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
#chat-header .info { flex: 1; }
#chat-header .name { font-weight: 600; font-size: 15px; }
#chat-header .status { font-size: 11px; color: #f0a500; }
#chat-header .status.secure { color: #4caf50; }

#messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: #2a3a50; border-radius: 2px; }

.bubble { max-width: 72%; padding: 8px 12px; border-radius: 14px; font-size: 14px; line-height: 1.45; word-break: break-word; }
.bubble.mine { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 4px; }
.bubble.theirs { align-self: flex-start; background: #1e2d3d; border-bottom-left-radius: 4px; }
.bubble .meta { font-size: 11px; color: #888; margin-bottom: 3px; }
.bubble .time { font-size: 10px; color: #666; text-align: right; margin-top: 4px; }
.sys-msg { text-align: center; font-size: 12px; color: #555; padding: 4px 0; }

#input-area { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #1e2d3d; border-top: 1px solid #2a3a50; flex-shrink: 0; }
#msg-input { flex: 1; padding: 10px 16px; background: #16212e; border: 1px solid #2a3a50; border-radius: 22px; color: #e0e0e0; font-size: 15px; outline: none; resize: none; max-height: 120px; overflow-y: auto; }
#msg-input:focus { border-color: #5b9bd5; }
#send-btn { width: 44px; height: 44px; background: #2b5278; border: none; border-radius: 50%; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#send-btn:active { background: #1e3d5c; }

/* Mobile: hide sidebar when chat open */
@media (max-width: 600px) {
  #sidebar { width: 100%; position: absolute; top: 0; left: 0; bottom: 0; z-index: 10; }
  #sidebar.hidden { display: none; }
  #chat-area { width: 100%; }
  #chat-header .back-btn { display: flex !important; }
}
.back-btn { display: none; background: none; border: none; color: #5b9bd5; font-size: 22px; cursor: pointer; padding: 0 8px 0 0; }

#invite-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #2b5278; color: white; padding: 8px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
#invite-toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="login-screen">
  <h1>💬 Secure Messenger</h1>
  <input id="inp-server" placeholder="Адрес сервера">
  <input id="inp-user" placeholder="Ваше имя">
  <div id="login-error"></div>
  <button onclick="connect()">Войти</button>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="app-title">💬 Secure Messenger</div>
      <div class="my-name" id="my-name-label"></div>
    </div>
    <div id="users-list">
      <div id="no-users">Нет пользователей онлайн</div>
    </div>
  </div>

  <div id="chat-area">
    <div id="empty-state">
      <div class="icon">💬</div>
      <div>Выберите собеседника</div>
    </div>
    <div id="chat-view">
      <div id="chat-header">
        <button class="back-btn" onclick="backToList()">←</button>
        <div class="avatar">👤</div>
        <div class="info">
          <div class="name" id="peer-name-label"></div>
          <div class="status" id="enc-status">Обмен ключами...</div>
        </div>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <textarea id="msg-input" rows="1" placeholder="Сообщение..."></textarea>
        <button id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<div id="invite-toast">Ссылка скопирована!</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let ws, username, currentPeer;
let myKeyPair = null;
let keySent = {};
let sessionKeys = {};
let chats = {};
let unread = {};
let onlineUsers = [];

// ── Crypto ────────────────────────────────────────────────────────────────────
function initCrypto() { myKeyPair = nacl.box.keyPair(); }
function exportPub() { return nacl.util.encodeBase64(myKeyPair.publicKey); }

function encryptMsg(text, theirPub) {
  const nonce = nacl.randomBytes(nacl.box.nonceLength);
  const ct = nacl.box(nacl.util.decodeUTF8(text), nonce, theirPub, myKeyPair.secretKey);
  const out = new Uint8Array(nonce.length + ct.length);
  out.set(nonce); out.set(ct, nonce.length);
  return nacl.util.encodeBase64(out);
}

function decryptMsg(b64, theirPub) {
  const data = nacl.util.decodeBase64(b64);
  const nonce = data.slice(0, nacl.box.nonceLength);
  const ct = data.slice(nacl.box.nonceLength);
  const pt = nacl.box.open(ct, nonce, theirPub, myKeyPair.secretKey);
  if (!pt) throw new Error('decrypt failed');
  return nacl.util.encodeUTF8(pt);
}

// ── Connect ───────────────────────────────────────────────────────────────────
function connect() {
  const server = document.getElementById('inp-server').value.trim();
  username = document.getElementById('inp-user').value.trim();
  const err = document.getElementById('login-error');

  if (!server || !username) { err.textContent = 'Заполните все поля'; return; }

  initCrypto();
  err.textContent = 'Подключение...';

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  try { ws = new WebSocket(`${proto}://${server}/ws`); } catch(e) { err.textContent = 'Неверный адрес'; return; }

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'register', username }));
  };
  ws.onmessage = (e) => onPacket(JSON.parse(e.data));
  ws.onerror = () => { err.textContent = 'Ошибка подключения'; };
  ws.onclose = () => { if (currentPeer) setStatus('❌ Соединение потеряно', false); };
}

function onPacket(pkt) {
  if (pkt.type === 'ack') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('show');
    document.getElementById('my-name-label').textContent = '🔵 ' + username;
  }
  else if (pkt.type === 'users') { onlineUsers = pkt.users; renderUsers(onlineUsers); }
  else if (pkt.type === 'key_exchange') onKeyExchange(pkt);
  else if (pkt.type === 'message') onMessage(pkt);
  else if (pkt.type === 'error') addSys(pkt.msg);
}

// ── Users list ────────────────────────────────────────────────────────────────
function renderUsers(users) {
  const list = document.getElementById('users-list');
  if (!list) return;
  list.innerHTML = '';

  if (users.length === 0) {
    const div = document.createElement('div');
    div.id = 'no-users';
    div.textContent = 'Нет пользователей онлайн';
    list.appendChild(div);
    return;
  }

  users.forEach(peer => {
    const lastMsg = chats[peer] ? chats[peer][chats[peer].length - 1] : null;
    const badge = (unread[peer] || 0) > 0 ? `<span class="user-badge">${unread[peer]}</span>` : '';
    const div = document.createElement('div');
    div.className = 'user-item' + (peer === currentPeer ? ' active' : '');
    div.innerHTML = `
      <div class="user-avatar">👤</div>
      <div class="user-info">
        <div class="user-name">${escHtml(peer)}</div>
        <div class="user-last">${lastMsg ? escHtml(lastMsg.text.substring(0,30)) : 'Нажмите чтобы написать'}</div>
      </div>
      ${badge}
    `;
    div.onclick = () => openChat(peer);
    list.appendChild(div);
  });
}

// ── Open chat ─────────────────────────────────────────────────────────────────
function openChat(peer) {
  currentPeer = peer;
  unread[peer] = 0;
  if (!chats[peer]) chats[peer] = [];

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-view').classList.add('show');
  document.getElementById('peer-name-label').textContent = peer;

  // Mobile: hide sidebar
  document.getElementById('sidebar').classList.add('hidden');

  // Render history
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  chats[peer].forEach(m => _addBubble(m.sender, m.text, m.ts));

  // Key exchange if not done
  if (!sessionKeys[peer]) {
    setStatus('🔑 Обмен ключами...', false);
  }
  // Always send our key when opening chat
  if (!keySent[peer]) {
    keySent[peer] = true;
    ws.send(JSON.stringify({ type: 'key_exchange', from: username, to: peer, pubkey: exportPub() }));
  }
  if (sessionKeys[peer]) setStatus('🔒 Зашифровано (E2E)', true);

  // Update sidebar active state
  document.querySelectorAll('.user-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.user-name')?.textContent === peer);
  });

  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('msg-input').focus();
}

function backToList() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('chat-view').classList.remove('show');
  document.getElementById('empty-state').style.display = 'flex';
  currentPeer = null;
}

// ── Key exchange ──────────────────────────────────────────────────────────────
function onKeyExchange(pkt) {
  const peer = pkt.from;
  sessionKeys[peer] = nacl.util.decodeBase64(pkt.pubkey);

  if (peer === currentPeer) setStatus('🔒 Зашифровано (E2E)', true);

  // Respond if we haven't sent our key yet
  if (!keySent[peer]) {
    keySent[peer] = true;
    ws.send(JSON.stringify({ type: 'key_exchange', from: username, to: peer, pubkey: exportPub() }));
  }
}

// ── Messages ──────────────────────────────────────────────────────────────────
function onMessage(pkt) {
  const peer = pkt.from;
  if (!sessionKeys[peer]) return;
  try {
    const text = decryptMsg(pkt.data, sessionKeys[peer]);
    const ts = Date.now() / 1000;
    if (!chats[peer]) chats[peer] = [];
    chats[peer].push({ sender: peer, text, ts });

    if (peer === currentPeer) {
      _addBubble(peer, text, ts);
    } else {
      unread[peer] = (unread[peer] || 0) + 1;
    }
    renderUsers(onlineUsers);
  } catch(e) { console.error('decrypt error', e); }
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentPeer) return;
  if (!sessionKeys[currentPeer]) { addSys('⚠️ Ключ ещё не согласован'); return; }

  const data = encryptMsg(text, sessionKeys[currentPeer]);
  ws.send(JSON.stringify({ type: 'message', from: username, to: currentPeer, data }));

  const ts = Date.now() / 1000;
  if (!chats[currentPeer]) chats[currentPeer] = [];
  chats[currentPeer].push({ sender: username, text, ts });
  _addBubble(username, text, ts);
  input.value = '';
  input.style.height = 'auto';
}

// ── UI ────────────────────────────────────────────────────────────────────────
function setStatus(text, secure) {
  const el = document.getElementById('enc-status');
  el.textContent = text;
  el.className = 'status' + (secure ? ' secure' : '');
}

function _addBubble(sender, text, ts) {
  const msgs = document.getElementById('messages');
  const isMine = sender === username;
  const time = new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = 'bubble ' + (isMine ? 'mine' : 'theirs');
  div.innerHTML = `${escHtml(text)}<div class="time">${time}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSys(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inp-server').value = location.host;
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/web/sw.js');

  const ta = document.getElementById('msg-input');
  ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; });
  ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  const params = new URLSearchParams(location.search);
  if (params.get('invite')) document.getElementById('inp-user').value = '';
});
</script>
</body>
</html>
