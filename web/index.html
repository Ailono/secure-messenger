<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Messenger</title>
<link rel="manifest" href="/web/manifest.json">
<meta name="theme-color" content="#16212e">
<script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#16212e;color:#e0e0e0;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* Auth */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;padding:24px}
#auth-screen h1{color:#5b9bd5;font-size:24px;margin-bottom:4px}
#auth-screen input{width:100%;max-width:320px;padding:13px 16px;background:#1e2d3d;border:1px solid #2a3a50;border-radius:10px;color:#e0e0e0;font-size:15px;outline:none}
#auth-screen input:focus{border-color:#5b9bd5}
#auth-screen input[type=password]{letter-spacing:2px}
.auth-btns{display:flex;gap:8px;width:100%;max-width:320px}
.auth-btns button{flex:1;padding:13px;border:none;border-radius:10px;font-size:15px;cursor:pointer}
#btn-login{background:#2b5278;color:white}
#btn-register{background:#1e3d5c;color:#aac}
#auth-error{color:#f44336;font-size:13px;min-height:18px}
#auth-hint{color:#555;font-size:12px;text-align:center;max-width:320px}

/* App */
#app{display:none;flex:1;overflow:hidden}
#app.show{display:flex}

/* Sidebar */
#sidebar{width:280px;background:#1a2535;border-right:1px solid #2a3a50;display:flex;flex-direction:column;flex-shrink:0}
#sidebar-header{padding:14px 16px;border-bottom:1px solid #2a3a50}
.app-title{color:#5b9bd5;font-size:15px;font-weight:bold}
.my-name{color:#888;font-size:12px;margin-top:2px}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid #2a3a50}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:#5b9bd5;border-bottom-color:#5b9bd5}
.tab-panel{display:none;flex:1;overflow-y:auto;flex-direction:column}
.tab-panel.active{display:flex}

/* List items */
.list-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #1e2d3d;transition:background .15s}
.list-item:hover{background:#1e2d3d}
.list-item.active{background:#2b5278}
.item-avatar{width:42px;height:42px;background:#2b5278;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative}
.list-item.active .item-avatar{background:#3a6a9a}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#4caf50;border-radius:50%;border:2px solid #1a2535}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.item-badge{background:#5b9bd5;color:white;border-radius:10px;font-size:11px;padding:2px 6px;flex-shrink:0}
.del-btn{background:none;border:none;color:#555;font-size:16px;cursor:pointer;padding:4px;flex-shrink:0;border-radius:6px;transition:color .15s}
.del-btn:hover{color:#f44336}
.empty-list{padding:24px 16px;text-align:center;color:#555;font-size:13px}

/* Chat area */
#chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#555;gap:12px}
#empty-state .icon{font-size:64px}
#chat-view{display:none;flex-direction:column;flex:1;overflow:hidden}
#chat-view.show{display:flex}
#chat-header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#1e2d3d;border-bottom:1px solid #2a3a50;flex-shrink:0}
#chat-header .avatar{width:38px;height:38px;background:#2b5278;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
#chat-header .info{flex:1}
#chat-header .name{font-weight:600;font-size:15px}
#chat-header .status{font-size:11px;color:#f0a500}
#chat-header .status.secure{color:#4caf50}
#fingerprint-bar{font-size:10px;color:#555;padding:2px 0 0;font-family:monospace;cursor:pointer}
#fingerprint-bar:hover{color:#5b9bd5}
#messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:#2a3a50;border-radius:2px}

/* Message bubbles */
.bubble{
  max-width:72%;
  padding:9px 14px;
  font-size:14px;
  line-height:1.5;
  word-break:break-word;
  position:relative;
}
.bubble.mine{
  align-self:flex-end;
  background:linear-gradient(135deg,#1e3d5c,#2b5278);
  border-radius:18px 18px 4px 18px;
  border:1px solid rgba(91,155,213,0.25);
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  color:#ddeeff;
}
.bubble.theirs{
  align-self:flex-start;
  background:linear-gradient(135deg,#1a2535,#1e2d3d);
  border-radius:18px 18px 18px 4px;
  border:1px solid rgba(255,255,255,0.07);
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  color:#c8d8e8;
}
.bubble .time{font-size:10px;color:#4a6a8a;text-align:right;margin-top:4px}
.msg-status{margin-left:4px;color:#888;font-size:11px}
.sys-msg{text-align:center;font-size:12px;color:#555;padding:4px 0}
#input-area{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#1e2d3d;border-top:1px solid #2a3a50;flex-shrink:0;position:relative}
#emoji-btn{width:36px;height:36px;background:none;border:none;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s}
#emoji-btn:hover{background:#2a3a50}
#emoji-picker-wrap{position:absolute;bottom:60px;left:8px;z-index:300;display:none}
#emoji-picker-wrap.show{display:block}
emoji-picker{--background:#1a2535;--border-color:#2a3a50;--category-font-color:#888;--indicator-color:#5b9bd5;--input-border-color:#2a3a50;--input-font-color:#e0e0e0;--input-placeholder-color:#555;--outline-color:#5b9bd5;--text-color:#e0e0e0;}
#attach-btn{width:36px;height:36px;background:none;border:none;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s}
#attach-btn:hover{background:#2a3a50}
#attach-menu{position:absolute;bottom:60px;left:48px;z-index:300;background:#1a2535;border:1px solid #2a3a50;border-radius:12px;padding:8px;display:none;flex-direction:column;gap:4px;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
#attach-menu.show{display:flex}
.attach-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;cursor:pointer;color:#e0e0e0;font-size:14px;white-space:nowrap;transition:background .15s}
.attach-item:hover{background:#2a3a50}
.bubble.file-bubble{cursor:pointer}
.bubble img.preview{max-width:220px;max-height:220px;border-radius:8px;display:block;margin-bottom:4px}
.file-info{display:flex;align-items:center;gap:8px;font-size:13px}
#mic-btn{width:36px;height:36px;background:none;border:none;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s}
#mic-btn:hover{background:#2a3a50}
#mic-btn.recording{background:#c0392b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
#mic-btn.video-mode{background:#1a3a5c}
.bubble audio{display:block;max-width:220px;margin-bottom:4px}
.voice-player{display:flex;align-items:center;gap:8px;min-width:180px;padding:2px 0}
.vp-play{width:32px;height:32px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.vp-play:hover{background:rgba(255,255,255,0.25)}
.vp-play.playing svg polygon{points:"6,19 6,5 10,5 10,19 14,5 14,19 18,19 18,5"}
.vp-bar{flex:1;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;cursor:pointer;position:relative}
.vp-progress{height:100%;background:#5b9bd5;border-radius:2px;width:0%;transition:width .1s linear}
.vp-time{font-size:11px;color:#6a8aaa;flex-shrink:0;min-width:32px}
.bubble video.circle{width:200px;height:200px;border-radius:50%;object-fit:cover;display:block;margin-bottom:4px}
#msg-input{flex:1;padding:10px 16px;background:#16212e;border:1px solid #2a3a50;border-radius:22px;color:#e0e0e0;font-size:15px;outline:none;resize:none;max-height:120px;overflow-y:hidden;}
#msg-input:focus{border-color:#5b9bd5}
#send-btn{width:44px;height:44px;background:#2b5278;border:none;border-radius:50%;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#send-btn:active{background:#1e3d5c}

/* Start chat button */
.start-chat-btn{margin:12px 16px;padding:10px;background:#2b5278;border:none;border-radius:8px;color:white;font-size:14px;cursor:pointer;width:calc(100% - 32px)}
.start-chat-btn:hover{background:#3a6a9a}

/* People modal */
#people-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);align-items:center;justify-content:center}
#people-modal.show{display:flex}
.modal-box{background:#1a2535;border:1px solid #2a3a50;border-radius:16px;width:340px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #2a3a50}
.modal-header h3{color:#e0e0e0;font-size:16px;margin:0}
.modal-close{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:0}
.modal-close:hover{color:#e0e0e0}
.modal-body{overflow-y:auto;flex:1;padding:8px 0}
.modal-section{padding:8px 16px 4px;font-size:11px;color:#5b9bd5;text-transform:uppercase;letter-spacing:1px}
.modal-user{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .15s}
.modal-user:hover{background:#1e2d3d}
.modal-user .avatar{width:38px;height:38px;background:#2b5278;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;flex-shrink:0;position:relative}
.modal-user .avatar .dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#4caf50;border-radius:50%;border:2px solid #1a2535}
.modal-user .uname{color:#e0e0e0;font-size:14px;font-weight:500}
.modal-user .ustatus{color:#888;font-size:12px}

/* Request confirm modal */
#req-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);align-items:center;justify-content:center}
#req-modal.show{display:flex}
.req-box{background:#1a2535;border:1px solid #2a3a50;border-radius:16px;width:300px;padding:24px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.req-box .req-avatar{width:64px;height:64px;background:#2b5278;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;margin:0 auto 12px}
.req-box h3{color:#e0e0e0;margin:0 0 8px;font-size:16px}
.req-box p{color:#888;font-size:13px;margin:0 0 20px;line-height:1.5}
.req-btns{display:flex;gap:10px}
.req-btns button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:500}
.req-btn-send{background:#2b5278;color:white}
.req-btn-send:hover{background:#3a6a9a}
.req-btn-cancel{background:#1e2d3d;color:#888;border:1px solid #2a3a50!important}

/* Incoming request modal */
#inc-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);align-items:center;justify-content:center}
#inc-modal.show{display:flex}

/* Bot messages */
.bubble.bot{align-self:center;background:#16212e;border:1px solid #2a3a50;border-radius:12px;max-width:85%;text-align:center;color:#aaa}
.bubble.bot .bot-actions{display:flex;gap:8px;margin-top:10px;justify-content:center}
.bubble.bot .bot-actions button{padding:7px 16px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
.btn-accept{background:#2b5278;color:white}
.btn-accept:hover{background:#3a6a9a}
.btn-decline{background:#1e2d3d;color:#888;border:1px solid #2a3a50}

@media(max-width:600px){
  #sidebar{width:100%;position:absolute;top:0;left:0;bottom:0;z-index:10}
  #sidebar.hidden{display:none}
  #chat-area{width:100%}
  #chat-header .back-btn{display:flex!important}
}
.back-btn{display:none;background:none;border:none;color:#5b9bd5;font-size:22px;cursor:pointer;padding:0 8px 0 0}
</style>
</head>
<body>

<div id="auth-screen">
  <h1>🔒 Secure Messenger</h1>
  <input id="inp-server" placeholder="Адрес сервера">
  <input id="inp-user" placeholder="Имя пользователя">
  <input id="inp-pass" type="password" placeholder="Пароль (мин. 8 символов)">
  <div id="auth-error"></div>
  <div class="auth-btns">
    <button id="btn-login" onclick="doLogin()">Войти</button>
    <button id="btn-register" onclick="doRegister()">Регистрация</button>
  </div>
  <div id="auth-hint">Пароль хранится только в виде bcrypt-хэша</div>
</div>

<!-- People modal -->
<div id="people-modal" onclick="if(event.target===this)closePeopleModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h3>🔍 Найти пользователя</h3>
      <button class="modal-close" onclick="closePeopleModal()">✕</button>
    </div>
    <div style="padding:10px 16px;border-bottom:1px solid #2a3a50">
      <input id="people-search" placeholder="Поиск по имени..." oninput="renderPeopleModal()"
        style="width:100%;padding:8px 12px;background:#16212e;border:1px solid #2a3a50;border-radius:8px;color:#e0e0e0;font-size:14px;outline:none">
    </div>
    <div class="modal-body" id="people-list" onclick="onPeopleListClick(event)"></div>
  </div>
</div>

<!-- Send request confirm modal -->
<div id="req-modal" onclick="if(event.target===this)closeReqModal()">
  <div class="req-box">
    <div class="req-avatar" id="req-avatar"></div>
    <h3 id="req-title"></h3>
    <p id="req-desc"></p>
    <div class="req-btns">
      <button class="req-btn-send" id="req-confirm-btn">Отправить запрос</button>
      <button class="req-btn-cancel" onclick="closeReqModal()">Отмена</button>
    </div>
  </div>
</div>

<!-- Incoming request modal -->
<div id="inc-modal" onclick="if(event.target===this)closeIncModal()">
  <div class="req-box">
    <div class="req-avatar" id="inc-avatar"></div>
    <h3 id="inc-title"></h3>
    <p id="inc-desc"></p>
    <div class="req-btns">
      <button class="btn-accept" id="inc-accept-btn">✓ Принять</button>
      <button class="btn-decline" id="inc-decline-btn">✕ Отклонить</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #2a3a50">
      <div style="display:flex;align-items:center;gap:10px">
        <div id="my-avatar-btn" onclick="openProfile()" style="width:36px;height:36px;background:#2b5278;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;cursor:pointer;color:white;flex-shrink:0" title="Профиль"></div>
        <div>
          <div class="app-title">🔒 Secure Messenger</div>
          <div class="my-name" id="my-name-label"></div>
        </div>
      </div>
      <button onclick="openPeopleModal()" title="Найти пользователя" style="width:34px;height:34px;background:#2b5278;border:none;border-radius:50%;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">🔍</button>
    </div>
    <div class="tab-panel active" id="tab-chats" style="display:flex;flex:1;overflow-y:auto;flex-direction:column">
      <div class="empty-list" id="no-chats">Нет активных чатов</div>
    </div>
  </div>

  <div id="chat-area">
    <div id="empty-state"><div class="icon">💬</div><div>Выберите чат или найдите собеседника</div></div>
    <div id="chat-view">
      <div id="chat-header">
        <button class="back-btn" onclick="backToList()">←</button>
        <div class="avatar">👤</div>
        <div class="info">
          <div class="name" id="peer-name-label"></div>
          <div class="status" id="enc-status">Обмен ключами...</div>
          <div id="fingerprint-bar" onclick="showFingerprint()" title="Нажмите для проверки fingerprint"></div>
        </div>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <div id="emoji-picker-wrap"><emoji-picker></emoji-picker></div>
        <div id="attach-menu">
          <div class="attach-item" onclick="triggerFileInput('image/*')">� Фото</div>
          <div class="attach-item" onclick="triggerFileInput('video/*')">🎥 Видео</div>
          <div class="attach-item" onclick="triggerFileInput('*/*')">📄 Файл</div>
        </div>
        <input type="file" id="file-input" style="display:none" onchange="handleFileSelected(this)">
        <button id="attach-btn" onclick="toggleAttachMenu()" title="Прикрепить файл">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6a8aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button id="emoji-btn" onclick="toggleEmojiPicker()" title="Эмодзи">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6a8aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </button>
        <textarea id="msg-input" rows="1" placeholder="Сообщение..."></textarea>
        <button id="mic-btn" title="Клик — переключить режим, зажать — записать">
          <svg id="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6a8aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button id="send-btn" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

let ws, username, authToken, serverHost, currentPeer;
let myKeyPair = null;
let keySent = {};
let peerPubKeys = {};
let chats = {};
let unread = {};
let onlineUsers = [];
let allUsers = [];
let msgStatus = {}; // id -> 'sent'|'delivered'|'read'

// ── Crypto ────────────────────────────────────────────────────────────────────
function initCrypto() {
  const storageKey = 'keypair_' + username;
  const saved = localStorage.getItem(storageKey);
  if (saved) {
    try {
      const { pub, sec } = JSON.parse(saved);
      myKeyPair = {
        publicKey:  nacl.util.decodeBase64(pub),
        secretKey:  nacl.util.decodeBase64(sec)
      };
      return;
    } catch(e) {}
  }
  myKeyPair = nacl.box.keyPair();
  localStorage.setItem(storageKey, JSON.stringify({
    pub: nacl.util.encodeBase64(myKeyPair.publicKey),
    sec: nacl.util.encodeBase64(myKeyPair.secretKey)
  }));
}
function exportPub()  { return nacl.util.encodeBase64(myKeyPair.publicKey); }

async function keyFingerprint(pubKeyBytes) {
  const buf = await crypto.subtle.digest('SHA-256', pubKeyBytes);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0'))
    .join(':').toUpperCase().substring(0,47);
}

function encryptMsg(text, theirPub) {
  const nonce = nacl.randomBytes(nacl.box.nonceLength);
  const ct = nacl.box(nacl.util.decodeUTF8(text), nonce, theirPub, myKeyPair.secretKey);
  const out = new Uint8Array(nonce.length + ct.length);
  out.set(nonce); out.set(ct, nonce.length);
  return nacl.util.encodeBase64(out);
}

function decryptMsg(b64, theirPub) {
  const data = nacl.util.decodeBase64(b64);
  const nonce = data.slice(0, nacl.box.nonceLength);
  const ct = data.slice(nacl.box.nonceLength);
  const pt = nacl.box.open(ct, nonce, theirPub, myKeyPair.secretKey);
  if (!pt) throw new Error('decrypt failed');
  return nacl.util.encodeUTF8(pt);
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function getAuthFields() {
  const server = document.getElementById('inp-server').value.trim();
  const user   = document.getElementById('inp-user').value.trim();
  const pass   = document.getElementById('inp-pass').value;
  const err    = document.getElementById('auth-error');
  if (!server || !user || !pass) { err.textContent='Заполните все поля'; return null; }
  if (pass.length < 8) { err.textContent='Пароль минимум 8 символов'; return null; }
  err.textContent = '';
  return {server, user, pass};
}

async function doRegister() {
  const f = getAuthFields(); if (!f) return;
  document.getElementById('auth-error').textContent = 'Регистрация...';
  try {
    const r = await fetch(`https://${f.server}/register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:f.user, password:f.pass})
    });
    const data = await r.json();
    if (!r.ok) { document.getElementById('auth-error').textContent = data.error||'Ошибка'; return; }
    authToken = data.token; username = f.user; serverHost = f.server.split('?')[0];
    initCrypto(); openApp();
  } catch(e) { document.getElementById('auth-error').textContent='Ошибка соединения'; }
}

async function doLogin() {
  const f = getAuthFields(); if (!f) return;
  document.getElementById('auth-error').textContent = 'Вход...';
  try {
    const r = await fetch(`https://${f.server}/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:f.user, password:f.pass})
    });
    const data = await r.json();
    if (!r.ok) { document.getElementById('auth-error').textContent = data.error||'Неверные данные'; return; }
    authToken = data.token; username = f.user; serverHost = f.server.split('?')[0];
    initCrypto(); openApp();
  } catch(e) { document.getElementById('auth-error').textContent='Ошибка соединения'; }
}

// ── Connect ───────────────────────────────────────────────────────────────────
let _reconnectTimer = null;

function openApp() {
  _connectWs();
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('my-name-label').textContent = '🔵 ' + username;
  const av = document.getElementById('my-avatar-btn');
  if (av) av.textContent = username[0].toUpperCase();
}

function _connectWs() {
  if (_reconnectTimer) { clearTimeout(_reconnectTimer); _reconnectTimer = null; }
  const proto = location.protocol==='https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${serverHost}/ws?token=${encodeURIComponent(authToken)}`);
  ws.onopen = () => {
    loadPeople();
    loadConversations();
    if (currentPeer) {
      setStatus('🔒 Зашифровано (E2E)', true);
      // Re-send key exchange after reconnect
      keySent[currentPeer] = true;
      ws.send(JSON.stringify({type:'key_exchange', to:currentPeer, pubkey:exportPub()}));
    }
  };
  ws.onmessage = e => onPacket(JSON.parse(e.data));
  ws.onerror   = () => {};
  ws.onclose   = () => {
    if (currentPeer) setStatus('🔄 Переподключение...', false);
    _reconnectTimer = setTimeout(_connectWs, 3000);
  };
}

    .then(r => r.json())

      allUsers   = (data.users  || []);
      onlineUsers = (data.online || []);

  _reqTarget = peer;

  document.getElementById('req-title').textContent = peer;
  document.getElementById('req-desc').textContent =
    `Отправить запрос на переписку пользователю ${peer}?`;

  document.getElementById('req-modal').classList.add('show');
}
function closeReqModal() {
  document.getElementById('req-modal').classList.remove('show');
  _reqTarget = null;
}

async function sendChatRequest() {
  if (!_reqTarget) return;
  const peer = _reqTarget;
  closeReqModal();
  const r = await fetch(`https://${serverHost}/chat_request?token=${encodeURIComponent(authToken)}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({to: peer})
  });
  const data = await r.json();
  if (data.status === 'sent') {
    addSys(`📨 Запрос отправлен пользователю ${peer}`);
  } else if (data.status === 'already_contacts') {
    openChat(peer);
  } else if (data.status === 'already_sent') {

async function deleteConversation(peer) {
  if (!confirm(`Удалить переписку с ${peer}? Это действие необратимо.`)) return;
  await fetch(`https://${serverHost}/conversation/${encodeURIComponent(peer)}?token=${encodeURIComponent(authToken)}`,
    { method: 'DELETE' });

  delete peerPubKeys[peer];
  delete keySent[peer];
  if (currentPeer === peer) {
    backToList();
  }
  loadConversations();
}

// ── Load conversations ────────────────────────────────────────────────────────
async function loadConversations() {
  try {
    const r = await fetch(`https://${serverHost}/conversations?token=${encodeURIComponent(authToken)}`);
    const data = await r.json();
    renderConversations(data.conversations || [], data.online || []);
  } catch(e) {}
}

function renderConversations(convs, online) {
  onlineUsers = online;
  const panel = document.getElementById('tab-chats');
  panel.innerHTML = '';
  if (!convs.length) {
    panel.innerHTML = '<div class="empty-list">Нет активных чатов</div>';
    return;
  }
  convs.forEach(c => {
    const peer = c.peer;
    const isOnline = online.includes(peer);
    const lastMsg = chats[peer]?.at(-1);
    let previewText = '🔒 зашифровано';
    if (lastMsg) {
      if (lastMsg.sender === 'SecureBot') {
        try { previewText = JSON.parse(lastMsg.text).text.replace(/\*/g,'').substring(0,30); } catch(e) { previewText = 'SecureBot'; }
      } else {
        previewText = lastMsg.text.substring(0,30);
      }
    }
    const item = document.createElement('div');
    item.className = 'list-item' + (peer===currentPeer?' active':'');
    item.onclick = () => openChat(peer);
    item.innerHTML = `
      <div class="item-avatar">${escHtml(peer[0].toUpperCase())}${isOnline?'<div class="online-dot"></div>':''}
      </div>
      <div class="item-info">
        <div class="item-name">${escHtml(peer)}</div>
        <div class="item-sub">${lastMsg ? escHtml(previewText) : '🔒 зашифровано'}</div>
      </div>
      ${(unread[peer]||0)>0?`<span class="item-badge">${unread[peer]}</span>`:''}
      <button class="del-btn" onclick="event.stopPropagation();deleteConversation('${escHtml(peer)}')" title="Удалить чат">🗑</button>`;
    panel.appendChild(item);
  });
}

// ── Online updates ────────────────────────────────────────────────────────────
function onPacket(pkt) {
  if (pkt.type==='ack') {
    loadPeople();
    loadConversations();
  }
  else if (pkt.type==='online') {
    onlineUsers = pkt.users;
    loadPeople();
    loadConversations();
  }
  else if (pkt.type==='chat_request') {
    // Just notify — user will see the request in SecureBot chat
    unread['SecureBot'] = (unread['SecureBot'] || 0) + 1;
    loadConversations();
  }
  else if (pkt.type==='request_accepted') {
    loadConversations();
    addSys(`✅ ${pkt.by} принял ваш запрос`);
    openChat(pkt.by);
  }
  else if (pkt.type==='contact_added') {
    loadConversations();
  }
  else if (pkt.type==='request_declined') { addSys(`❌ ${pkt.by} отклонил ваш запрос`); }
  else if (pkt.type==='key_exchange') onKeyExchange(pkt);
  else if (pkt.type==='message')      onMessage(pkt);
  else if (pkt.type==='status') {
    msgStatus[pkt.id] = pkt.status;
    _updateStatusBubble(pkt.id, pkt.status);
  }
  else if (pkt.type==='status_bulk') {
    // All our messages to this peer were read
    document.querySelectorAll(`.bubble.mine[data-peer="${escHtml(pkt.from)}"]`).forEach(el => {
      const id = el.dataset.msgid;
      if (id) { msgStatus[id] = 'read'; _updateStatusBubble(id, 'read'); }
    });
  }
  else if (pkt.type==='error') addSys('⚠️ '+pkt.msg);
}

// ── Open chat ─────────────────────────────────────────────────────────────────
async function openChat(peer) {
  currentPeer = peer;
  unread[peer] = 0;
  if (!chats[peer]) chats[peer] = [];

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-view').classList.add('show');
  document.getElementById('peer-name-label').textContent = peer;
  document.getElementById('sidebar').classList.add('hidden');

  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';

  await loadHistory(peer);

  if (!keySent[peer]) {
    keySent[peer] = true;
    ws.send(JSON.stringify({type:'key_exchange', to:peer, pubkey:exportPub()}));
  }

  // If peer is offline, try fetching their stored public key (skip for bot)
  if (!peerPubKeys[peer] && peer !== 'SecureBot') {
    try {
      const r = await fetch(`https://${serverHost}/pubkey/${encodeURIComponent(peer)}?token=${encodeURIComponent(authToken)}`);
      if (r.ok) {
        const data = await r.json();
        peerPubKeys[peer] = nacl.util.decodeBase64(data.pubkey);
        if (chats[peer]?._pending?.length) decryptPending(peer);
      }
    } catch(e) {}
  }

  if (peerPubKeys[peer] || peer === 'SecureBot') { setStatus('🔒 Зашифровано (E2E)', true); updateFingerprint(peer); }
  else setStatus('🔑 Ожидание ключа...', false);

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type:'read', peer}));
  }

  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('msg-input').focus();
  loadConversations();
}

async function loadHistory(peer) {
  try {
    const r = await fetch(`https://${serverHost}/history/${encodeURIComponent(peer)}?token=${encodeURIComponent(authToken)}`);
    const data = await r.json();
    if (!chats[peer]) chats[peer] = [];
    const msgs = data.messages || [];
    if (peer === 'SecureBot') {
      // Bot messages don't need decryption
      chats[peer] = []; // reset to avoid duplicates
      msgs.forEach(m => {
        chats[peer].push({sender: m.sender, text: m.ciphertext, ts: m.ts});
        _addBubble(m.sender, m.ciphertext, m.ts);
      });
    } else {
      chats[peer]._pending = msgs;
      if (peerPubKeys[peer]) decryptPending(peer);
    }
  } catch(e) {}
}

function decryptPending(peer) {
  const pending = chats[peer]._pending || [];
  chats[peer]._pending = [];
  const msgs = document.getElementById('messages');
  pending.forEach(m => {
    try {
      // Bot messages don't need decryption
      if (m.sender === 'SecureBot') {
        const parsed = JSON.parse(m.ciphertext);
        if (parsed.bot) {
          chats[peer].push({sender:'SecureBot', text: m.ciphertext, ts: m.ts});
          if (peer === currentPeer) _addBubble('SecureBot', m.ciphertext, m.ts);
          return;
        }
      }
      const text = decryptMsg(m.ciphertext, peerPubKeys[peer]);
      chats[peer].push({sender:m.sender, text, ts:m.ts});
      if (peer===currentPeer) _addBubble(m.sender, text, m.ts);
    } catch(e) {
      // Can't decrypt history from previous session (PFS) — expected
    }
  });
  if (peer===currentPeer) msgs.scrollTop = msgs.scrollHeight;
}

function backToList() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('chat-view').classList.remove('show');
  document.getElementById('empty-state').style.display = 'flex';
  currentPeer = null;
}

// ── Key exchange ──────────────────────────────────────────────────────────────
async function onKeyExchange(pkt) {
  const peer = pkt.from;
  peerPubKeys[peer] = nacl.util.decodeBase64(pkt.pubkey);
  if (peer===currentPeer) { setStatus('🔒 Зашифровано (E2E)', true); await updateFingerprint(peer); }
  // Decrypt any pending history now that we have the key
  if (chats[peer]?._pending?.length) decryptPending(peer);
  if (!keySent[peer]) { keySent[peer]=true; ws.send(JSON.stringify({type:'key_exchange',to:peer,pubkey:exportPub()})); }
}

async function updateFingerprint(peer) {
  if (!peerPubKeys[peer]) return;
  const fp = await keyFingerprint(peerPubKeys[peer]);
  document.getElementById('fingerprint-bar').textContent = '🔑 '+fp;
}

async function showFingerprint() {
  if (!currentPeer||!peerPubKeys[currentPeer]) return;
  const myFp   = await keyFingerprint(myKeyPair.publicKey);
  const peerFp = await keyFingerprint(peerPubKeys[currentPeer]);
  alert(`Fingerprint верификация\n\nВаш ключ:\n${myFp}\n\nКлюч ${currentPeer}:\n${peerFp}\n\nСравните по другому каналу. Если совпадает — MITM исключён.`);
}

// ── Messages ──────────────────────────────────────────────────────────────────
function onMessage(pkt) {
  const peer = pkt.from;
  // Bot messages — no decryption needed
  if (peer === 'SecureBot') {
    const ts = Date.now()/1000;
    if (!chats[peer]) chats[peer] = [];
    chats[peer].push({sender: peer, text: pkt.data, ts});
    if (peer === currentPeer) {
      _addBubble(peer, pkt.data, ts);
    } else {
      unread[peer] = (unread[peer]||0) + 1;
    }
    loadConversations();
    return;
  }
  if (!peerPubKeys[peer]) return;
  try {
    const text = decryptMsg(pkt.data, peerPubKeys[peer]);
    const ts = Date.now()/1000;
    if (!chats[peer]) chats[peer]=[];
    chats[peer].push({sender:peer, text, ts});
    if (peer===currentPeer) {
      _addBubble(peer, text, ts);
      // Tell sender we read it
      ws.send(JSON.stringify({type:'read', peer}));
    } else {
      unread[peer]=(unread[peer]||0)+1;
    }
    loadConversations();
  } catch(e) { addSys('❌ Ошибка расшифровки'); }
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text||!currentPeer) return;
  if (!peerPubKeys[currentPeer]) { addSys('⚠️ Ключ ещё не согласован — дождитесь когда собеседник зайдёт онлайн'); return; }
  if (!ws || ws.readyState !== WebSocket.OPEN) { addSys('⚠️ Нет соединения, переподключение...'); return; }
  const data = encryptMsg(text, peerPubKeys[currentPeer]);
  const tmpId = 'tmp_' + Date.now();
  ws.send(JSON.stringify({type:'message', to:currentPeer, data, tmp_id: tmpId}));
  const ts = Date.now()/1000;
  if (!chats[currentPeer]) chats[currentPeer]=[];
  chats[currentPeer].push({sender:username, text, ts});
  _addBubble(username, text, ts, tmpId, currentPeer);
  input.value=''; input.style.height='auto';
  loadConversations();
}

// ── UI ────────────────────────────────────────────────────────────────────────
function setStatus(text, secure) {
  const el = document.getElementById('enc-status');
  el.textContent=text; el.className='status'+(secure?' secure':'');
}

function _addBubble(sender, text, ts, msgId, peer) {
  const msgs = document.getElementById('messages');
  const isMine = sender === username;
  const isBot  = sender === 'SecureBot';

  // Bot message — try parse JSON
  if (isBot) {
    try {
      const parsed = JSON.parse(text);
      if (parsed.bot) {
        const div = document.createElement('div');
        div.className = 'bubble bot';
        const txt = parsed.text.replace(/\*(.*?)\*/g, '<b>$1</b>');
        // Check if it's a request message (has accept/decline)
        const isRequest = parsed.text.includes('хочет начать');
        const senderMatch = parsed.text.match(/Пользователь \*(.+?)\*/);
        const reqSender = senderMatch ? senderMatch[1] : null;
        div.innerHTML = `<div>${txt}</div>`;
        if (isRequest && reqSender) {
          const actions = document.createElement('div');
          actions.className = 'bot-actions';
          const btnA = document.createElement('button');
          btnA.className = 'btn-accept'; btnA.textContent = '✓ Принять';
          btnA.onclick = async () => {
            actions.remove();
            await fetch(`https://${serverHost}/chat_request/respond?token=${encodeURIComponent(authToken)}`, {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({from: reqSender, action: 'accept'})
            });
            loadConversations();
            openChat(reqSender);
          };
          const btnD = document.createElement('button');
          btnD.className = 'btn-decline'; btnD.textContent = '✕ Отклонить';
          btnD.onclick = async () => {
            actions.remove();
            await fetch(`https://${serverHost}/chat_request/respond?token=${encodeURIComponent(authToken)}`, {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({from: reqSender, action: 'decline'})
            });
            loadConversations();
          };
          actions.appendChild(btnA); actions.appendChild(btnD);
          div.appendChild(actions);
        }
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return;
      }
    } catch(e) {}
  }

  const time = new Date(ts*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const div = document.createElement('div');
  div.className='bubble '+(isMine?'mine':'theirs');
  if (msgId) { div.dataset.msgid=msgId; div.dataset.peer=peer||currentPeer||''; }
  const statusHtml = isMine ? `<span class="msg-status" id="st_${msgId||''}">✓</span>` : '';

  // Check if file message
  let contentHtml = escHtml(text);
  try {
    const parsed = JSON.parse(text);
    if (parsed.file) {
      const isImage = parsed.mime && parsed.mime.startsWith('image/');
      const isVideo = parsed.mime && parsed.mime.startsWith('video/');
      if (isImage) {
        contentHtml = `<img class="preview" src="${escHtml(parsed.url)}" onclick="window.open('${escHtml(parsed.url)}','_blank')" loading="lazy">`;
      } else if (isVideo && parsed.circle) {
        contentHtml = `<video class="circle" src="${escHtml(parsed.url)}" controls playsinline></video>`;
      } else if (isVideo) {
        contentHtml = `<video class="preview" src="${escHtml(parsed.url)}" controls style="max-width:220px;border-radius:8px"></video>`;
      } else if (parsed.mime && parsed.mime.startsWith('audio/')) {
        const uid = 'a' + Math.random().toString(36).slice(2);
        contentHtml = `
          <div class="voice-player" id="${uid}">
            <button class="vp-play" onclick="vpToggle('${uid}','${escHtml(parsed.url)}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#c8d8e8"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <div class="vp-bar"><div class="vp-progress" id="${uid}-prog"></div></div>
            <span class="vp-time" id="${uid}-time">0:00</span>
          </div>`;
      } else {
        contentHtml = `<div class="file-info">📄 <a href="${escHtml(parsed.url)}" target="_blank" style="color:#5b9bd5">${escHtml(parsed.name)}</a></div>`;
      }
    }
  } catch(e) {}

  div.innerHTML=`${contentHtml}<div class="time">${time}${statusHtml}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function _updateStatusBubble(id, status) {
  const el = document.getElementById('st_'+id);
  if (!el) return;
  if (status==='delivered') el.textContent='✓✓';
  else if (status==='read')  { el.textContent='✓✓'; el.style.color='#5b9bd5'; }
}

function addSys(text) {
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='sys-msg'; div.textContent=text;
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Voice player ──────────────────────────────────────────────────────────────
const _vpAudios = {};

function vpToggle(uid, url) {
  if (!_vpAudios[uid]) {
    _vpAudios[uid] = new Audio(url);
    _vpAudios[uid].ontimeupdate = () => {
      const a = _vpAudios[uid];
      const pct = a.duration ? (a.currentTime / a.duration * 100) : 0;
      const el = document.getElementById(uid + '-prog');
      const tm = document.getElementById(uid + '-time');
      if (el) el.style.width = pct + '%';
      if (tm) tm.textContent = _vpFmt(a.currentTime);
    };
    _vpAudios[uid].onended = () => {
      const btn = document.querySelector(`#${uid} .vp-play svg polygon`);
      if (btn) btn.setAttribute('points', '5,3 19,12 5,21');
      const el = document.getElementById(uid + '-prog');
      if (el) el.style.width = '0%';
    };
  }
  const a = _vpAudios[uid];
  const btn = document.querySelector(`#${uid} .vp-play svg polygon`);
  if (a.paused) {
    // Pause all others
    Object.values(_vpAudios).forEach(x => { if (x !== a) x.pause(); });
    a.play();
    if (btn) btn.setAttribute('points', '6,19 6,5 10,5 10,19 14,5 14,19 18,19 18,5');
  } else {
    a.pause();
    if (btn) btn.setAttribute('points', '5,3 19,12 5,21');
  }
}

function _vpFmt(s) {
  const m = Math.floor(s / 60);
  return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

// ── Voice recording ───────────────────────────────────────────────────────────
let _mediaRecorder = null;
let _audioChunks = [];
let _micMode = 'audio'; // 'audio' | 'video'

function toggleMicMode() {
  if (_mediaRecorder) return;
  _micMode = _micMode === 'audio' ? 'video' : 'audio';
  const btn = document.getElementById('mic-btn');
  btn.classList.toggle('video-mode', _micMode === 'video');
  const icon = document.getElementById('mic-icon');
  if (_micMode === 'video') {
    icon.innerHTML = '<path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>';
  } else {
    icon.innerHTML = '<path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>';
  }
}

async function startRecording() {
  if (_mediaRecorder) return;
  try {
    const constraints = _micMode === 'video'
      ? {audio: true, video: {facingMode: 'user', width: 400, height: 400}}
      : {audio: true};
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    _audioChunks = [];
    const mimeType = _micMode === 'video' ? 'video/webm' : 'audio/webm';
    _mediaRecorder = new MediaRecorder(stream, {mimeType});
    _mediaRecorder.ondataavailable = e => { if (e.data.size > 0) _audioChunks.push(e.data); };
    _mediaRecorder.start();
    const btn = document.getElementById('mic-btn');
    btn.classList.add('recording');
  } catch(e) {
    addSys('⚠️ Нет доступа к ' + (_micMode === 'video' ? 'камере' : 'микрофону'));
  }
}

async function stopRecording() {
  if (!_mediaRecorder) return;
  const mode = _micMode;
  _mediaRecorder.stop();
  _mediaRecorder.stream.getTracks().forEach(t => t.stop());
  const btn = document.getElementById('mic-btn');
  btn.classList.remove('recording');
  _mediaRecorder.onstop = async () => {
    const mimeType = mode === 'video' ? 'video/webm' : 'audio/webm';
    const blob = new Blob(_audioChunks, {type: mimeType});
    if (blob.size < 1000) { _mediaRecorder = null; return; }
    const ext = mode === 'video' ? 'webm' : 'webm';
    const name = mode === 'video' ? `circle_${Date.now()}.${ext}` : `voice_${Date.now()}.${ext}`;
    const form = new FormData();
    form.append('file', blob, name);
    addSys(`📤 Отправка ${mode === 'video' ? 'видео' : 'голосового'}...`);
    try {
      const r = await fetch(`https://${serverHost}/upload?token=${encodeURIComponent(authToken)}`, {
        method: 'POST', body: form
      });
      const data = await r.json();
      if (!r.ok) { addSys('❌ Ошибка отправки'); return; }
      const msgName = mode === 'video' ? 'Видео-кружок' : 'Голосовое сообщение';
      const payload = JSON.stringify({file:true, url:data.url, name:msgName, mime:mimeType, circle: mode === 'video'});
      if (!peerPubKeys[currentPeer]) { addSys('⚠️ Ключ не согласован'); return; }
      const encrypted = encryptMsg(payload, peerPubKeys[currentPeer]);
      const tmpId = 'tmp_' + Date.now();
      ws.send(JSON.stringify({type:'message', to:currentPeer, data:encrypted, tmp_id:tmpId}));
      const ts = Date.now()/1000;
      chats[currentPeer].push({sender:username, text:payload, ts});
      _addBubble(username, payload, ts, tmpId, currentPeer);
      loadConversations();
    } catch(e) { addSys('❌ Ошибка отправки'); }
    _mediaRecorder = null;
  };
}

// ── Attach files ──────────────────────────────────────────────────────────────
function toggleAttachMenu() {
  document.getElementById('attach-menu').classList.toggle('show');
  document.getElementById('emoji-picker-wrap').classList.remove('show');
}

function triggerFileInput(accept) {
  const input = document.getElementById('file-input');
  input.accept = accept;
  input.click();
  document.getElementById('attach-menu').classList.remove('show');
}

async function handleFileSelected(input) {
  const file = input.files[0];
  if (!file || !currentPeer) return;
  if (file.size > 50 * 1024 * 1024) { addSys('⚠️ Файл слишком большой (макс. 50MB)'); return; }
  addSys(`📤 Загрузка ${file.name}...`);
  const form = new FormData();
  form.append('file', file, file.name);
  try {
    const r = await fetch(`https://${serverHost}/upload?token=${encodeURIComponent(authToken)}`, {
      method: 'POST', body: form
    });
    const data = await r.json();
    if (!r.ok) { addSys('❌ Ошибка загрузки'); return; }
    // Send file URL as message
    const payload = JSON.stringify({file: true, url: data.url, name: data.name, mime: data.type});
    if (!peerPubKeys[currentPeer]) { addSys('⚠️ Ключ не согласован'); return; }
    const encrypted = encryptMsg(payload, peerPubKeys[currentPeer]);
    const tmpId = 'tmp_' + Date.now();
    ws.send(JSON.stringify({type:'message', to:currentPeer, data:encrypted, tmp_id:tmpId}));
    const ts = Date.now()/1000;
    chats[currentPeer].push({sender:username, text:payload, ts});
    _addBubble(username, payload, ts, tmpId, currentPeer);
    loadConversations();
  } catch(e) { addSys('❌ Ошибка загрузки'); }
  input.value = '';
}

// ── Emoji picker ──────────────────────────────────────────────────────────────
function toggleEmojiPicker() {
  const wrap = document.getElementById('emoji-picker-wrap');
  wrap.classList.toggle('show');
}

document.addEventListener('DOMContentLoaded', () => {
  // Emoji picker selection
  document.addEventListener('emoji-click', e => {
    const input = document.getElementById('msg-input');
    const emoji = e.detail.unicode;
    const pos = input.selectionStart;
    input.value = input.value.slice(0, pos) + emoji + input.value.slice(pos);
    input.selectionStart = input.selectionEnd = pos + emoji.length;
    input.focus();
    document.getElementById('emoji-picker-wrap').classList.remove('show');
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  // Close picker on outside click
  document.addEventListener('click', e => {
    const wrap = document.getElementById('emoji-picker-wrap');
    if (!wrap.contains(e.target) && e.target.id !== 'emoji-btn') {
      wrap.classList.remove('show');
    }
    const menu = document.getElementById('attach-menu');
    if (!menu.contains(e.target) && e.target.id !== 'attach-btn') {
      menu.classList.remove('show');
    }
  });

  document.getElementById('inp-server').value = location.host.split('?')[0];

  // Mic button: short click = toggle mode, long press = record
  const micBtn = document.getElementById('mic-btn');
  let _micPressTimer = null;
  let _micPressed = false;

  function micDown(e) {
    e.preventDefault();
    _micPressed = false;
    _micPressTimer = setTimeout(() => {
      _micPressed = true;
      startRecording();
    }, 300);
  }
  function micUp(e) {
    e.preventDefault();
    clearTimeout(_micPressTimer);
    if (_micPressed) {
      stopRecording();
    } else {
      toggleMicMode();
    }
  }
  micBtn.addEventListener('mousedown', micDown);
  micBtn.addEventListener('mouseup', micUp);
  micBtn.addEventListener('touchstart', micDown, {passive:false});
  micBtn.addEventListener('touchend', micUp, {passive:false});
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/web/sw.js');
  const ta = document.getElementById('msg-input');
  ta.addEventListener('input', ()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; });
  ta.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
});
</script>
